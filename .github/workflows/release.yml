name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: nowplaying-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: nowplaying-linux-arm64
          - target: riscv64gc-unknown-linux-musl
            os: ubuntu-latest
            artifact: nowplaying-linux-riscv64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: nowplaying-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: nowplaying-windows-arm64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: nowplaying-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: nowplaying-macos-arm64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux build tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == riscv64* ]]; then
            sudo apt-get install -y gcc-riscv64-linux-gnu
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_MUSL_LINKER: riscv64-linux-gnu-gcc

      - name: Rename binary
        run: |
          src=target/${{ matrix.target }}/release/nowplaying
          [[ "${{ matrix.os }}" == windows-* ]] && src="${src}.exe"
          mv "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: nowplaying-*
