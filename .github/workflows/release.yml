name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: nowplaying-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: nowplaying-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nowplaying-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: nowplaying-windows-arm64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nowplaying-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nowplaying-macos-arm64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          src="target/${{ matrix.target }}/release/nowplaying"
          [[ "${{ matrix.os }}" == windows-* ]] && src="${src}.exe"
          mv "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  macos-universal:
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nowplaying-macos-*
          merge-multiple: true

      - name: Create universal binary
        run: |
          lipo -create -output nowplaying-macos-universal \
            nowplaying-macos-amd64 nowplaying-macos-arm64
          chmod +x nowplaying-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nowplaying-macos-universal
          path: nowplaying-macos-universal

  release:
    needs: [build, macos-universal]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: nowplaying-*
